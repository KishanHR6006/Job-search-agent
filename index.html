<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Hunt Agent · Kishan</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080a10; font-family: system-ui, sans-serif; color: #fff; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    .job-row { transition: background 0.2s; }
    .job-row:hover { background: rgba(255,255,255,0.04) !important; cursor: pointer; }
    .tag { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 10px; font-family: monospace; border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); margin-right: 4px; margin-bottom: 2px; }
    .filter-btn { padding: 6px 14px; border-radius: 8px; font-size: 11px; font-family: monospace; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; }
    .filter-btn.active { background: rgba(123,140,255,0.15); border-color: #7b8cff; color: #7b8cff; }
    .filter-btn:not(.active) { background: transparent; color: rgba(255,255,255,0.3); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .spin { animation: pulse 1.5s infinite; }
    .fadein { animation: fadeIn 0.4s ease; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // Broad PM keywords — score based on how many appear in title+description
    const KEYWORDS = [
      "product manager","product management","senior pm","saas","b2b","platform",
      "roadmap","agile","scrum","sprint","stakeholder","strategy","discovery",
      "user research","metrics","kpis","growth","retention","onboarding","api",
      "integration","enterprise","fintech","payments","workflow","automation",
      "cross-functional","go-to-market","gtm","launch","prioritization","backlog",
      "data-driven","analytics","a/b testing","customer","revenue","mrr","arr",
      "jira","confluence","figma","sql","dashboard","okr","product led"
    ];

    const MATCH_THRESHOLD = 65; // lowered from 80 to show more results

    function scoreJob(job) {
      const text = `${job.title} ${job.description || ""} ${(job.tags || []).join(" ")}`.toLowerCase();
      const hits = KEYWORDS.filter(k => text.includes(k));
      const base = 45;
      const score = base + Math.round((hits.length / KEYWORDS.length) * 60);
      // Bonus for senior/lead in title
      if (job.title.toLowerCase().includes("senior") || job.title.toLowerCase().includes("lead")) return Math.min(98, score + 5);
      return Math.min(98, score);
    }

    const STATUS_META = {
      applied:     { label: "Applied",     color: "#00d4aa", bg: "rgba(0,212,170,0.12)" },
      pending:     { label: "Queued",       color: "#f5a623", bg: "rgba(245,166,35,0.12)" },
      followed_up: { label: "Followed Up",  color: "#7b8cff", bg: "rgba(123,140,255,0.12)" },
      rejected:    { label: "No Response",  color: "#ff5e7a", bg: "rgba(255,94,122,0.12)" },
    };

    function MatchRing({ score }) {
      const r = 22, c = 2 * Math.PI * r, fill = (score / 100) * c;
      const color = score >= 80 ? "#00d4aa" : score >= 65 ? "#f5a623" : "#ff5e7a";
      return (
        <svg width="56" height="56" viewBox="0 0 60 60">
          <circle cx="30" cy="30" r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="5"/>
          <circle cx="30" cy="30" r={r} fill="none" stroke={color} strokeWidth="5"
            strokeDasharray={`${fill} ${c}`} strokeLinecap="round"
            style={{transform:"rotate(-90deg)",transformOrigin:"50% 50%",transition:"stroke-dasharray 1s ease"}}/>
          <text x="30" y="35" textAnchor="middle" fill={color} fontSize="12" fontFamily="monospace" fontWeight="700">{score}%</text>
        </svg>
      );
    }

    function StatCard({ label, value, accent }) {
      return (
        <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:"16px 20px",flex:1,minWidth:110}}>
          <div style={{fontSize:26,fontWeight:800,fontFamily:"monospace",color:accent}}>{value}</div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginTop:4,textTransform:"uppercase",letterSpacing:1.5}}>{label}</div>
        </div>
      );
    }

    function AgentLog({ logs }) {
      const ref = useRef();
      useEffect(() => { if (ref.current) ref.current.scrollTop = ref.current.scrollHeight; }, [logs]);
      return (
        <div ref={ref} style={{fontFamily:"monospace",fontSize:12,background:"rgba(0,0,0,0.4)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"12px 16px",height:140,overflowY:"auto",lineHeight:1.8}}>
          {logs.map((l, i) => (
            <div key={i} style={{color:l.type==="success"?"#00d4aa":l.type==="warn"?"#f5a623":l.type==="error"?"#ff5e7a":"rgba(255,255,255,0.5)"}}>
              <span style={{color:"rgba(255,255,255,0.2)"}}>{l.time} </span>{l.msg}
            </div>
          ))}
        </div>
      );
    }

    function OutreachModal({ job, onClose }) {
      const [copied, setCopied] = useState(false);
      const msg = `Hi [Hiring Manager],\n\nI came across the ${job.title} role at ${job.company_name} — looks like a strong match.\n\nI've spent 9+ years in Fintech SaaS, including Procure-to-Pay automation at RazorpayX and Oracle NetSuite integrations with Fortune 500 clients at Sage Group. I've shipped roadmaps that moved retention and MRR, and I thrive in cross-functional, fast-moving environments.\n\nWorth a quick 10-min chat?\n\nBest,\nKishan`;
      const copy = () => { navigator.clipboard.writeText(msg); setCopied(true); setTimeout(() => setCopied(false), 2000); };
      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",backdropFilter:"blur(6px)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:"#0f1117",border:"1px solid rgba(255,255,255,0.1)",borderRadius:20,padding:28,maxWidth:540,width:"100%",position:"relative"}}>
            <button onClick={onClose} style={{position:"absolute",top:14,right:16,background:"none",border:"none",color:"rgba(255,255,255,0.4)",fontSize:20,cursor:"pointer"}}>✕</button>
            <div style={{fontSize:11,color:"#7b8cff",textTransform:"uppercase",letterSpacing:2,marginBottom:6}}>Cold Outreach Draft</div>
            <div style={{fontSize:14,fontWeight:700,color:"#fff",marginBottom:16}}>{job.title} @ {job.company_name}</div>
            <textarea defaultValue={msg} style={{width:"100%",height:200,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,color:"rgba(255,255,255,0.8)",fontFamily:"monospace",fontSize:12,padding:12,resize:"none",lineHeight:1.7,boxSizing:"border-box"}}/>
            <div style={{display:"flex",gap:10,marginTop:14}}>
              <button onClick={copy} style={{flex:1,padding:"11px 0",background:copied?"rgba(0,212,170,0.2)":"#00d4aa",color:copied?"#00d4aa":"#000",border:copied?"1px solid #00d4aa":"none",borderRadius:10,fontWeight:700,fontSize:13,cursor:"pointer"}}>
                {copied?"✓ Copied!":"Copy Message"}
              </button>
              <button onClick={onClose} style={{flex:1,padding:"11px 0",background:"rgba(255,255,255,0.06)",color:"#fff",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,fontWeight:600,fontSize:13,cursor:"pointer"}}>Close</button>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [jobs, setJobs] = useState([]);
      const [loading, setLoading] = useState(false);
      const [fetched, setFetched] = useState(false);
      const [filter, setFilter] = useState("all");
      const [outreachJob, setOutreachJob] = useState(null);
      const [statuses, setStatuses] = useState({});
      const [threshold, setThreshold] = useState(MATCH_THRESHOLD);
      const [logs, setLogs] = useState([
        { time: "—", msg: "Agent ready. Click ▶ Run Agent to fetch live Remotive jobs.", type: "info" },
      ]);

      const addLog = (msg, type = "info") => {
        const time = new Date().toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" });
        setLogs(l => [...l, { time, msg, type }]);
      };

      const tryFetch = async (url, parseRaw = false) => {
        const res = await fetch(url);
        if (parseRaw) {
          const raw = await res.json();
          return JSON.parse(raw.contents);
        }
        return await res.json();
      };

      const fetchJobs = async () => {
        setLoading(true);
        addLog("🔍 Fetching live PM jobs from Remotive...", "info");
        let data = null;

        // Try proxy 1
        try {
          const url = "https://api.allorigins.win/get?url=" + encodeURIComponent("https://remotive.com/api/remote-jobs?category=product&limit=100");
          data = await tryFetch(url, true);
          addLog("✓ Connected via allorigins proxy.", "success");
        } catch (e) {
          addLog("↳ Primary proxy failed, trying backup...", "warn");
        }

        // Try proxy 2
        if (!data) {
          try {
            const url = "https://corsproxy.io/?" + encodeURIComponent("https://remotive.com/api/remote-jobs?category=product&limit=100");
            data = await tryFetch(url, false);
            addLog("✓ Connected via corsproxy.io.", "success");
          } catch (e) {
            addLog("✗ Both proxies failed. Check internet connection.", "error");
            setLoading(false);
            return;
          }
        }

        const scored = data.jobs
          .map(j => ({ ...j, match: scoreJob(j), found: new Date().toISOString().split("T")[0] }))
          .sort((a, b) => b.match - a.match);

        setJobs(scored);
        const qualified = scored.filter(j => j.match >= threshold);
        addLog(`✓ Fetched ${scored.length} PM roles total.`, "success");
        addLog(`✓ ${qualified.length} jobs at ≥${threshold}% match shown.`, "success");
        addLog(`⚠ ${scored.length - qualified.length} jobs below threshold — hidden.`, "warn");

        const init = {};
        scored.forEach(j => { init[j.id] = "pending"; });
        setStatuses(init);
        setFetched(true);
        setLoading(false);
      };

      const markApplied = (id, e) => {
        e.stopPropagation();
        setStatuses(s => ({ ...s, [id]: "applied" }));
        addLog(`📤 Applied: ${jobs.find(j => j.id === id)?.title}`, "success");
      };

      const exportExcel = () => {
        const XLSX = window.XLSX;
        const rows = displayJobs.map(j => ({
          "Job Title": j.title,
          "Company": j.company_name,
          "Match %": j.match,
          "Salary": j.salary || "Not specified",
          "Tags": (j.tags || []).join(", "),
          "Status": STATUS_META[statuses[j.id] || "pending"]?.label || "Queued",
          "Platform": "Remotive",
          "JD Link": j.url,
          "Date Found": j.found,
          "Posted": j.publication_date?.split("T")[0] || "",
        }));
        const ws = XLSX.utils.json_to_sheet(rows);
        ws["!cols"] = [{wch:45},{wch:25},{wch:10},{wch:20},{wch:30},{wch:14},{wch:12},{wch:50},{wch:14},{wch:14}];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Job_Hunt_Log");
        const ws2 = XLSX.utils.aoa_to_sheet([
          ["Job Hunt Summary",""],
          ["Date", new Date().toLocaleDateString("en-IN")],
          ["Total Fetched", jobs.length],
          [`≥${threshold}% Match`, displayJobs.length],
          ["Applied", Object.values(statuses).filter(s => s === "applied").length],
          ["Source","Remotive API (Free)"],
          ["Target","Senior PM · Remote"],
        ]);
        ws2["!cols"] = [{wch:20},{wch:35}];
        XLSX.utils.book_append_sheet(wb, ws2, "Summary");
        XLSX.writeFile(wb, `Job_Hunt_Log_${new Date().toISOString().split("T")[0]}.xlsx`);
        addLog("📊 Excel exported.", "success");
      };

      const qualifiedJobs = jobs.filter(j => j.match >= threshold);
      const displayJobs = filter === "all" ? qualifiedJobs : qualifiedJobs.filter(j => (statuses[j.id] || "pending") === filter);
      const appliedCount = Object.values(statuses).filter(s => s === "applied").length;

      return (
        <div style={{background:"#080a10",minHeight:"100vh",padding:"24px 20px",maxWidth:1040,margin:"0 auto"}}>

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24,flexWrap:"wrap",gap:14}}>
            <div>
              <div style={{fontSize:11,color:"#7b8cff",textTransform:"uppercase",letterSpacing:3,marginBottom:6}}>Job Hunt Agent · Kishan · Live</div>
              <h1 style={{fontSize:24,fontWeight:800,letterSpacing:-0.5}}>Command Center</h1>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.3)",marginTop:4,fontFamily:"monospace"}}>Remotive API · Free · Senior PM · Remote</div>
            </div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
              {/* Threshold slider */}
              <div style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"8px 14px"}}>
                <span style={{fontSize:11,color:"rgba(255,255,255,0.4)",fontFamily:"monospace"}}>Min Match:</span>
                <input type="range" min="50" max="90" value={threshold} onChange={e => setThreshold(Number(e.target.value))}
                  style={{width:80,accentColor:"#7b8cff"}}/>
                <span style={{fontSize:12,color:"#7b8cff",fontFamily:"monospace",minWidth:30}}>{threshold}%</span>
              </div>
              {fetched && (
                <button onClick={exportExcel} style={{padding:"11px 18px",background:"rgba(0,212,170,0.1)",color:"#00d4aa",border:"1px solid rgba(0,212,170,0.3)",borderRadius:12,fontWeight:700,fontSize:13,cursor:"pointer"}}>
                  ↓ Excel
                </button>
              )}
              <button onClick={fetchJobs} disabled={loading} className={loading?"spin":""}
                style={{padding:"11px 22px",background:loading?"rgba(123,140,255,0.1)":"#7b8cff",color:loading?"#7b8cff":"#fff",border:loading?"1px solid #7b8cff":"none",borderRadius:12,fontWeight:700,fontSize:13,cursor:loading?"wait":"pointer"}}>
                {loading?"⚙ Fetching...":fetched?"↺ Refresh":"▶ Run Agent"}
              </button>
            </div>
          </div>

          <div style={{display:"flex",gap:12,marginBottom:22,flexWrap:"wrap"}}>
            <StatCard label="Fetched" value={jobs.length||"—"} accent="#7b8cff"/>
            <StatCard label={`≥${threshold}% Match`} value={qualifiedJobs.length||"—"} accent="#00d4aa"/>
            <StatCard label="Applied" value={appliedCount||"—"} accent="#00d4aa"/>
            <StatCard label="Match Rate" value={jobs.length?`${Math.round((qualifiedJobs.length/jobs.length)*100)}%`:"—"} accent="#f5a623"/>
          </div>

          <div style={{marginBottom:22}}>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",textTransform:"uppercase",letterSpacing:2,marginBottom:8}}>Agent Log</div>
            <AgentLog logs={logs}/>
          </div>

          {fetched && (
            <div className="fadein">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",textTransform:"uppercase",letterSpacing:2}}>Qualified Jobs · {displayJobs.length} shown</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {["all","pending","applied","followed_up"].map(f => (
                    <button key={f} className={`filter-btn ${filter===f?"active":""}`} onClick={() => setFilter(f)}>
                      {f==="all"?"All":STATUS_META[f]?.label}
                    </button>
                  ))}
                </div>
              </div>

              <div style={{border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,overflow:"hidden"}}>
                {displayJobs.length === 0 && (
                  <div style={{padding:40,textAlign:"center",color:"rgba(255,255,255,0.25)",fontFamily:"monospace",fontSize:13}}>
                    No jobs at ≥{threshold}% — try lowering the Min Match slider above.
                  </div>
                )}
                {displayJobs.map((job, i) => {
                  const st = statuses[job.id] || "pending";
                  const s = STATUS_META[st];
                  return (
                    <div key={job.id} className="job-row"
                      style={{display:"grid",gridTemplateColumns:"52px 1fr auto",gap:14,alignItems:"center",padding:"14px 18px",borderBottom:i<displayJobs.length-1?"1px solid rgba(255,255,255,0.05)":"none"}}>
                      <MatchRing score={job.match}/>
                      <div style={{minWidth:0}}>
                        <a href={job.url} target="_blank" rel="noopener noreferrer"
                          style={{fontWeight:700,fontSize:14,color:"#fff",textDecoration:"none",display:"block",marginBottom:3}}>
                          {job.title} ↗
                        </a>
                        <div style={{fontSize:12,color:"rgba(255,255,255,0.4)",marginBottom:6}}>
                          {job.company_name}
                          {job.salary && <span style={{color:"#00d4aa",marginLeft:10}}>{job.salary}</span>}
                          <span style={{color:"rgba(255,255,255,0.2)",marginLeft:10}}>{job.publication_date?.split("T")[0]}</span>
                          {job.candidate_required_location && <span style={{color:"rgba(255,255,255,0.2)",marginLeft:10}}>📍 {job.candidate_required_location}</span>}
                        </div>
                        <div>{(job.tags||[]).slice(0,5).map(t => <span key={t} className="tag">{t}</span>)}</div>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:7,alignItems:"flex-end"}}>
                        <span style={{padding:"3px 12px",borderRadius:20,fontSize:11,fontFamily:"monospace",color:s.color,background:s.bg,border:`1px solid ${s.color}33`,whiteSpace:"nowrap"}}>{s.label}</span>
                        <div style={{display:"flex",gap:6}}>
                          {st !== "applied" && (
                            <button onClick={e => markApplied(job.id, e)}
                              style={{padding:"5px 12px",background:"rgba(0,212,170,0.1)",border:"1px solid rgba(0,212,170,0.3)",borderRadius:8,color:"#00d4aa",fontSize:11,cursor:"pointer",fontFamily:"monospace"}}>
                              ✓ Apply
                            </button>
                          )}
                          <button onClick={() => setOutreachJob(job)}
                            style={{padding:"5px 12px",background:"rgba(123,140,255,0.1)",border:"1px solid rgba(123,140,255,0.25)",borderRadius:8,color:"#7b8cff",fontSize:11,cursor:"pointer",fontFamily:"monospace"}}>
                            Outreach ↗
                          </button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>

              <div style={{marginTop:14,display:"flex",justifyContent:"flex-end"}}>
                <button onClick={exportExcel}
                  style={{padding:"9px 18px",background:"rgba(0,212,170,0.07)",border:"1px solid rgba(0,212,170,0.2)",borderRadius:10,color:"#00d4aa",fontSize:12,cursor:"pointer",fontFamily:"monospace"}}>
                  ↓ Download Job_Hunt_Log.xlsx
                </button>
              </div>
            </div>
          )}

          {!fetched && !loading && (
            <div style={{textAlign:"center",padding:"60px 20px",color:"rgba(255,255,255,0.2)",fontFamily:"monospace",fontSize:13,border:"1px dashed rgba(255,255,255,0.07)",borderRadius:16}}>
              Click ▶ Run Agent to fetch live PM jobs from Remotive
            </div>
          )}

          <div style={{textAlign:"center",marginTop:24,fontSize:11,color:"rgba(255,255,255,0.1)",fontFamily:"monospace"}}>
            Remotive API · Free · Dual CORS Proxy · Adjustable Match Filter · Excel Export
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
